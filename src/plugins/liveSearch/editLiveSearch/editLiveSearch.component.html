<input #htmlInput
       type="text"
       autocorrect="off"
       autocapitalize="none"
       autocomplete="off"
       role="combobox"
       [attr.aria-label]="selectBus.selectedOptions() | displayValue | localize"
       [class]="cssClasses()"
       [tooltip]="selectBus.selectedOptions() | displayValue | localize"
       [disabled]="selectBus.selectOptions().readonly"
       [placeholder]="(!(selectBus.selectedOptions() | hasValue) ? selectBus.selectOptions().placeholder : '') | localize"
       (click)="click()"
       (focus)="focus()"
       (blur)="blur()"
       (input)="input($event)">

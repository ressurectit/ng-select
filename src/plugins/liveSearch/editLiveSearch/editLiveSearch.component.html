<input type="text"
       autocorrect="off"
       autocapitalize="none"
       autocomplete="off"
       [attr.aria-label]="selectBus.selectedOptions() | displayValue | localize"
       [value]="value() | displayValue | localize"
       [class.absolute-input]="true"
       [tooltip]="selectBus.selectedOptions() | displayValue | localize"
       [disabled]="selectBus.selectOptions().readonly"
       (click)="click()"
       (focus)="focus()"
       (input)="input($event)">

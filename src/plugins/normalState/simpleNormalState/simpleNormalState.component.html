<ng-template #defaultLook>{{selectBus.selectedOptions() | displayValue | localize}}</ng-template>

<button type="button"
        role="combobox"
        [class]="options.cssClasses.element"
        [disabled]="!!selectBus.selectOptions().readonly"
        [attr.aria-expanded]="selectBus.popupVisible()"
        [attr.aria-controls]="selectBus.popupVisible() ? selectBus.id : null"
        [attr.aria-activedescendant]="selectBus.popupVisible() ? activeDescendant() : null"
        [attr.aria-label]="selectBus.selectedOptions() | displayValue | localize"
        [tooltip]="selectBus.selectedOptions() | displayValue | localize"
        (click)="click()"
        (blur)="blur()"
        (focus)="focus()">
    <span [class]="options.cssClasses.value">
        <ng-container *ngTemplateOutlet="selectBus.selectOptions().templateGatherer.normalStateTemplate() || defaultLook; context: {$implicit: this}"/>
    </span>
</button>

@if(options.cancelValue && (selectBus.selectedOptions() | hasValue))
{
    <button type="button" 
            [class]="options.cssClasses.cancel" 
            [tooltip]="options.texts.cancelTitle | localize" 
            [attr.aria-label]="options.texts.cancelTitle | localize"
            (click)="cancel()" 
            (blur)="blur()" 
            (focus)="focus()">
        <span [class]="options.cssClasses.cancelIcon"></span>
    </button>
}

<button type="button" [class]="options.cssClasses.carret" (click)="click()" (focus)="focus()" (blur)="blur()" tabindex="-1" aria-hidden="true">
    <span [class]="options.cssClasses.carretIcon"></span>
</button>

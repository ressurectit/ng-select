<ng-template #defaultLook>{{selectBus.selectedOptions() | displayValue | localize}}</ng-template>

<button type="button"
        role="combobox"
        [class]="options.cssClasses.element"
        [disabled]="!!selectBus.selectOptions().readonly"
        [tooltip]="selectBus.selectedOptions() | displayValue | localize"
        (click)="click()"
        (blur)="blur()"
        (focus)="focus()">
    <span [class]="options.cssClasses.value">
        <ng-container *ngTemplateOutlet="selectBus.selectOptions().templateGatherer.normalStateTemplate() || defaultLook; context: {$implicit: this}"/>
    </span>
</button>

@if(options.cancelValue && (selectBus.selectedOptions() | hasValue))
{
    <button type="button" [class]="options.cssClasses.cancel" (click)="cancel()" (blur)="blur()" (focus)="focus()">
        <span [class]="options.cssClasses.cancelIcon"></span>
    </button>
}

<button type="button" [class]="options.cssClasses.carret" (click)="click()" (focus)="focus()" (blur)="blur()" tabindex="-1">
    <span [class]="options.cssClasses.carretIcon"></span>
</button>
